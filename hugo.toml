baseURL = "https://xiaoyu-ops.github.io/"
locale = "zh-cn"
title = "Xiaoyu's Space"
theme = "PaperMod"
paginate = 10

[params]
  author = "Xiaoyu"
  description = "个人主页 — 关于我、我的工作与未来规划"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.profileMode]
    enabled = true
    title = "Zhuoyang Wu (Xiaoyu)"
    subtitle = "Building AI that interacts with the physical world."
    imageUrl = "/images/avatar.png"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Zhuoyang Wu"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xiaoyu-ops"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:wuzhuoyang252@gmail.com"

  [[params.socialIcons]]
    name = "wechat"
    url = "weixin://dl/chat?woshiwudachong"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    identifier = "work"
    name = "Work"
    url = "/work/"
    weight = 2
  [[menu.main]]
    identifier = "future"
    name = "What's Next"
    url = "/future/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
