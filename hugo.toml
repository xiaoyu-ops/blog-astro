baseURL = "https://xiaoyu-ops.github.io/"
locale = "zh-cn"
title = "Xiaoyu's Space"
theme = "PaperMod"
paginate = 10

[params]
  author = "Xiaoyu"
  description = "个人主页 — 关于我、我的工作与未来规划"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hi, I'm Zhuoyang Wu (Xiaoyu)"
    Content = """
I'm a third-year undergraduate at **Sun Yat-sen University**, School of Cyberspace Security (Class of 2027), based in Shenzhen, China. I have close to **1.5 years of research experience** at SYSU.

I recently completed a 3-month internship at **Sangfor Technologies** as an AI Algorithm Intern on the Tianwen AI team, where I focused on data mining for a self-evolving Agent system.

My current direction is **Embodied AI** — specifically exploring VLA (Vision-Language-Action) models and World Models. I am currently working on a robotic arm project to build hands-on experience in this space.

Next up: locking in my IELTS score, then seeking research assistant opportunities in embodied intelligence.

Feel free to reach out via email or WeChat — I'm always happy to connect.

*"Code that runs. AI that acts."*
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xiaoyu-ops"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:wuzhuoyang252@gmail.com"

  [[params.socialIcons]]
    name = "wechat"
    url = "weixin://dl/chat?woshiwudachong"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "关于我"
    url = "/about/"
    weight = 1
  [[menu.main]]
    identifier = "work"
    name = "我的工作"
    url = "/work/"
    weight = 2
  [[menu.main]]
    identifier = "future"
    name = "未来规划"
    url = "/future/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
