baseURL = "https://xiaoyu-ops.github.io/"
locale = "zh-cn"
title = "Xiaoyu's Space"
theme = "PaperMod"
paginate = 10

[params]
  author = "Xiaoyu"
  description = "个人主页 — 关于我、我的工作与未来规划"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "Hi, I'm Zhuoyang Wu (Xiaoyu)"
    Content = """
Building AI that interacts with the physical world.

Undergraduate @ Sun Yat-sen University · Embodied AI · AI Agents · Data Systems

*"Code that runs. AI that acts."*
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xiaoyu-ops"

[menu]
  [[menu.main]]
    identifier = "about"
    name = "关于我"
    url = "/about/"
    weight = 1
  [[menu.main]]
    identifier = "work"
    name = "我的工作"
    url = "/work/"
    weight = 2
  [[menu.main]]
    identifier = "future"
    name = "未来规划"
    url = "/future/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
