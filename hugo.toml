baseURL = "https://xiaoyu-ops.github.io/"
title = "Zhuoyang Wu"
theme = "PaperMod"

# 默认语言改为中文
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 10

# 多语言配置
[languages]
  [languages.zh]
    languageName = "中文"
    languageCode = "zh-CN"
    weight = 1
    contentDir = "content"
    [languages.zh.params]
      author = "吴卓阳"
      description = "吴卓阳 — 具身智能、AI Agent、数据系统。中山大学本科生。"
      profileModeTitle = "吴卓阳"
      profileModeSubtitle = "构建能与物理世界交互的 AI"
      menuBlog = "博客"
      menuAbout = "关于"
      menuWork = "作品"
      menuFuture = "未来规划"
    
  [languages.en]
    languageName = "English"
    languageCode = "en-US"
    weight = 2
    contentDir = "content/en"
    [languages.en.params]
      author = "Zhuoyang Wu"
      description = "Zhuoyang Wu — Embodied AI, AI Agents, Data Systems. Undergraduate at Sun Yat-sen University."
      profileModeTitle = "Zhuoyang Wu (Xiaoyu)"
      profileModeSubtitle = "Building AI that interacts with the physical world."
      menuBlog = "Blog"
      menuAbout = "About"
      menuWork = "Work"
      menuFuture = "What's Next"

[params]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  
  # 启用语言切换按钮（显示在右上角）
  displayLangInHeader = true
  # 显示完整语言名称
  displayFullLangName = true

  [params.profileMode]
    enabled = true
    imageUrl = "/images/avatar.png"
    imageWidth = 160
    imageHeight = 160
    imageTitle = "Zhuoyang Wu"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/xiaoyu-ops"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:wuzhuoyang252@gmail.com"

  [[params.socialIcons]]
    name = "wechat"
    url = "weixin://dl/chat?woshiwudachong"

# 中文菜单
[languages.zh.menu]
  [[languages.zh.menu.main]]
    identifier = "blog"
    name = "博客"
    url = "/posts/"
    weight = 1
  [[languages.zh.menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 1
  [[languages.zh.menu.main]]
    identifier = "work"
    name = "作品"
    url = "/work/"
    weight = 2
  [[languages.zh.menu.main]]
    identifier = "future"
    name = "未来规划"
    url = "/future/"
    weight = 3

# 英文菜单
[languages.en.menu]
  [[languages.en.menu.main]]
    identifier = "blog"
    name = "Blog"
    url = "/posts/"
    weight = 1
  [[languages.en.menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 1
  [[languages.en.menu.main]]
    identifier = "work"
    name = "Work"
    url = "/work/"
    weight = 2
  [[languages.en.menu.main]]
    identifier = "future"
    name = "What's Next"
    url = "/future/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
