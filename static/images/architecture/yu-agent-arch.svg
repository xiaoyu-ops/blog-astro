<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" style="background:#0d1117">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold">yu_agent 统一多模型 Agent 框架</text>

  <!-- User Input -->
  <rect x="50" y="70" width="120" height="40" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="110" y="95" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="12">用户输入</text>

  <!-- Arrow -->
  <path d="M170 90 L210 90" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Router -->
  <rect x="220" y="60" width="140" height="60" rx="10" fill="url(#grad1)" stroke="#f0883e" stroke-width="2" filter="url(#shadow)"/>
  <text x="290" y="82" text-anchor="middle" fill="#f0883e" font-family="system-ui" font-size="14" font-weight="bold">模型路由器</text>
  <text x="290" y="100" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">8+ 提供商自动检测</text>
  <text x="290" y="114" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">OpenAI 兼容接口</text>

  <!-- Arrow -->
  <path d="M360 90 L400 90" stroke="#f0883e" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Reasoning Engine -->
  <rect x="410" y="60" width="160" height="60" rx="10" fill="url(#grad1)" stroke="#a371f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="490" y="82" text-anchor="middle" fill="#a371f7" font-family="system-ui" font-size="14" font-weight="bold">推理引擎</text>
  <text x="490" y="100" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">4 种推理模式</text>
  <text x="490" y="114" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">动态切换</text>

  <!-- Down arrow to reasoning modes -->
  <path d="M490 120 L490 160" stroke="#a371f7" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 4 Reasoning Modes -->
  <rect x="340" y="170" width="100" height="50" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="192" text-anchor="middle" fill="#58a6ff" font-family="system-ui" font-size="12" font-weight="bold">Simple</text>
  <text x="390" y="210" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">直接回答</text>

  <rect x="450" y="170" width="100" height="50" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="192" text-anchor="middle" fill="#58a6ff" font-family="system-ui" font-size="12" font-weight="bold">ReAct</text>
  <text x="500" y="210" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">推理+行动</text>

  <rect x="560" y="170" width="100" height="50" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="610" y="192" text-anchor="middle" fill="#58a6ff" font-family="system-ui" font-size="12" font-weight="bold">Reflection</text>
  <text x="610" y="210" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">生成-审查-修正</text>

  <rect x="670" y="170" width="120" height="50" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="192" text-anchor="middle" fill="#58a6ff" font-family="system-ui" font-size="12" font-weight="bold">PlanAndSolve</text>
  <text x="730" y="210" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">计划-执行</text>

  <!-- Arrow to Tool System -->
  <path d="M500 220 L500 250 L400 250 L400 280" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Tool System -->
  <rect x="280" y="290" width="160" height="60" rx="10" fill="#21262d" stroke="#3fb950" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="312" text-anchor="middle" fill="#3fb950" font-family="system-ui" font-size="14" font-weight="bold">工具系统</text>
  <text x="360" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">内置工具 + MCP 协议</text>
  <text x="360" y="344" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">Function Calling</text>

  <!-- Arrow to Memory -->
  <path d="M570 220 L570 250 L680 250 L680 280" stroke="#a371f7" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Memory System -->
  <rect x="600" y="290" width="220" height="80" rx="10" fill="#21262d" stroke="#f778ba" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="312" text-anchor="middle" fill="#f778ba" font-family="system-ui" font-size="14" font-weight="bold">4 层记忆架构</text>
  <text x="710" y="330" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">① 上下文内  →  ② 工作记忆</text>
  <text x="710" y="348" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">③ Qdrant 向量  →  ④ Neo4j 图谱</text>
  <text x="710" y="362" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">混合检索: Score = (S_vector×0.7 + S_graph×0.3) × k</text>

  <!-- Arrow down to Output -->
  <path d="M360 350 L360 380" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M710 370 L710 380 L360 380" stroke="#f778ba" stroke-width="2" fill="none"/>

  <!-- Output -->
  <rect x="250" y="400" width="200" height="50" rx="8" fill="#21262d" stroke="#58a6ff" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="422" text-anchor="middle" fill="#58a6ff" font-family="system-ui" font-size="14" font-weight="bold">输出结果</text>
  <text x="350" y="440" text-anchor="middle" fill="#8b949e" font-family="system-ui" font-size="10">流式 SSE 响应</text>

  <!-- Legend -->
  <rect x="50" y="470" width="800" height="90" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="495" fill="#e6edf3" font-family="system-ui" font-size="14" font-weight="bold">核心设计决策</text>

  <text x="70" y="520" fill="#8b949e" font-family="system-ui" font-size="11">• 统一抽象层: 兼容 8+ LLM 提供商（DeepSeek、通义、Kimi 等），通过四级检测自动识别提供商</text>
  <text x="70" y="540" fill="#8b949e" font-family="system-ui" font-size="11">• 4 种推理模式: 按任务复杂度动态切换，Simple 模式处理简单问答，PlanAndSolve 处理多步任务</text>
  <text x="70" y="560" fill="#8b949e" font-family="system-ui" font-size="11">• 4 层记忆: 从短期上下文到长期知识图谱，混合检索融合向量相似度和图关系，权重动态调节</text>
</svg>